# Full local-first stack for the Job Offer Matcher (research §5), all in containers.
# Pinned images + named volumes; the password comes from a gitignored .env (Principle IV).
# Start everything with: docker compose up -d --build   →  UI at http://localhost:8080
services:
  db:
    image: postgres:17-alpine
    container_name: jobs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jobs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - jobs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobs} -d ${POSTGRES_DB:-jobs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The whole app in one container: ASP.NET Core host serving the built SPA + /api
  # (README §3 "run for real"). EF append-only migrations apply at startup (Principle IX).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: jobs-app
    container_name: jobs-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Talk to the db service over the compose network (internal port 5432).
      ConnectionStrings__AppDb: "Host=db;Port=5432;Database=${POSTGRES_DB:-jobs};Username=${POSTGRES_USER:-jobs};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      # The loopback-only PII APIs (/api/enrichment, /api/backup) can't see 127.0.0.1 in a container —
      # host-published traffic arrives via the Docker bridge gateway. Trust private-network sources so
      # those APIs work. SAFE ONLY because the port below is bound to the host loopback (127.0.0.1),
      # so nothing off this machine can reach the app. Keep these two settings together (Principle IV).
      Loopback__TrustPrivateNetwork: "true"
    ports:
      # Host loopback only — the app is single-user/local-first; never expose it on the LAN.
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    volumes:
      # Persist uploaded CVs across container rebuilds (gitignored on the host).
      - jobs_cvdata:/app/cv-data

volumes:
  jobs_pgdata:
    name: jobs_pgdata
  jobs_cvdata:
    name: jobs_cvdata
